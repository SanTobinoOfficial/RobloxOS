<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brak dostępu – RobloxOS</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tło + layout ── */
    html, body {
      height: 100%;
      background: #0f0f0f;
      color: #ffffff;
      font-family: "Ubuntu", "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Karta centralna ── */
    .card {
      text-align: center;
      max-width: 560px;
      padding: 56px 48px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Ikona ── */
    .icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
      filter: grayscale(0.2);
    }

    /* ── Nagłówek ── */
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #e53935;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: #888888;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* ── Zablokowany URL ── */
    .blocked-url-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555555;
      margin-bottom: 8px;
    }

    .blocked-url {
      display: inline-block;
      background: #111111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: "Ubuntu Mono", "Consolas", monospace;
      font-size: 13px;
      color: #e53935;
      word-break: break-all;
      max-width: 100%;
      margin-bottom: 36px;
    }

    /* ── Przycisk Wróć ── */
    .btn-back {
      display: inline-block;
      padding: 14px 36px;
      background: #1e88e5;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s ease, transform 0.1s ease;
      text-decoration: none;
    }

    .btn-back:hover  { background: #1565c0; }
    .btn-back:active { background: #0d47a1; transform: scale(0.97); }

    /* ── Stopka ── */
    footer {
      margin-top: 40px;
      font-size: 11px;
      color: #333333;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🚫</span>
    <h1>Brak dostępu</h1>
    <p class="subtitle">
      Ta strona nie znajduje się na liście dozwolonych witryn.<br>
      Skontaktuj się z administratorem systemu, aby uzyskać dostęp.
    </p>

    <p class="blocked-url-label">Zablokowany adres</p>
    <div class="blocked-url" id="blocked-url">—</div>

    <button class="btn-back" onclick="goBack()">&#8592; Wróć</button>

    <footer>RobloxOS Guard &mdash; Strona zablokowana</footer>
  </div>

  <script>
    // Odczytujemy oryginalny URL z query stringa (?url=...) jeśli background.js
    // go przekazał, lub próbujemy z document.referrer jako fallback.
    (function () {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("url") || document.referrer || "";

      const el = document.getElementById("blocked-url");
      if (raw) {
        // Bezpieczne wyświetlenie – tylko tekst, zero innerHTML
        el.textContent = decodeURIComponent(raw).slice(0, 200);
      } else {
        el.textContent = "(nieznany adres)";
      }
    })();

    function goBack() {
      // Jeśli historia jest pusta (nowa karta), wróć do Roblox
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "https://www.roblox.com";
      }
    }
  </script>
</body>
</html>
