# /etc/lightdm/lightdm.conf
# RobloxOS – konfiguracja LightDM
#
# Cel: autologin do sesji Openbox bez wyświetlania ekranu logowania.
# Dokumentacja: man lightdm.conf(5)
#
# Weryfikacja po instalacji:
#   systemctl status lightdm
#   journalctl -u lightdm --since "5 minutes ago"

[LightDM]
# Startuj na pierwszym wirtualnym terminalu (vt1 = Ctrl+Alt+F1)
minimum-vt=1

# Wyłącz gościa systemowego
allow-guest=false

# Brak dźwięku startowego
play-ready-sound=false

[Seat:*]
# ── Autologin ───────────────────────────────────────────────────────────────
# Użytkownik loguje się automatycznie bez podawania hasła.
autologin-user=robloxuser

# Timeout (sekundy) zanim autologin zostanie wykonany.
# 0 = natychmiast, bez czekania na ekran logowania.
autologin-user-timeout=0

# ── Sesja ───────────────────────────────────────────────────────────────────
# Plik sesji: /usr/share/xsessions/openbox.desktop
user-session=openbox

# Wrapper sesji – standardowy skrypt LightDM sourcujący .xsession / .profile
session-wrapper=/etc/lightdm/Xsession

# ── Greeter – wyłączony ─────────────────────────────────────────────────────
# Greeter to UI ekranu logowania. Przy autologin nie jest wyświetlany,
# ale LightDM wymaga podania nazwy. Używamy minimalnego (tekstowego).
# Jeśli lightdm-greeter jest zainstalowany, LightDM go uruchomi tylko
# gdy autologin zawiedzie (np. konto zablokowane).
greeter-session=lightdm-autologin-greeter

# Alternatywa – jeśli powyższy pakiet nie jest zainstalowany:
# greeter-session=lightdm-gtk-greeter

# ── Bezpieczeństwo ───────────────────────────────────────────────────────────
# Nie zezwalaj na zmianę sesji (użytkownik nie może wybrać innej niż openbox)
allow-user-switching=false

# Brak możliwości zmiany użytkownika
hide-users-hint=true

# ── X Server ────────────────────────────────────────────────────────────────
# Dodatkowe flagi Xorg (opcjonalne)
# xserver-command=X -nolisten tcp   # zablokuj zdalne połączenia X11

[XDMCPServer]
# XDMCP wyłączony – nie udostępniamy zdalnego ekranu
enabled=false
